<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Восстановление пароля — Аркентий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50:"#eef2ff",100:"#e0e7ff",500:"#6366f1",600:"#4f46e5",700:"#4338ca" } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col">
  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center">
      <a href="/" class="text-xl font-bold text-brand-600">Аркентий</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-16">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">

        <!-- Форма -->
        <div id="form-view">
          <h1 class="text-2xl font-bold text-gray-900 mb-2 text-center">Забыли пароль?</h1>
          <p class="text-sm text-gray-500 text-center mb-6">Введите email — пришлём ссылку для сброса</p>
          <form id="forgot-form" class="space-y-4">
            <div>
              <label class="block text-sm text-gray-600 mb-1">Email</label>
              <input type="email" id="email" required
                class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                placeholder="email@example.com">
            </div>
            <div id="error" class="text-red-600 text-sm hidden"></div>
            <button type="submit" id="submit-btn"
              class="w-full py-2.5 bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700 transition disabled:opacity-50">
              Отправить ссылку
            </button>
          </form>
          <div class="mt-4 text-center text-sm text-gray-500">
            <a href="/login.html" class="text-brand-600 hover:text-brand-700">← Назад ко входу</a>
          </div>
        </div>

        <!-- Успех -->
        <div id="success-view" class="hidden text-center">
          <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-gray-900 mb-2">Письмо отправлено</h2>
          <p class="text-sm text-gray-500 mb-6">Если этот email зарегистрирован, ссылка для сброса придёт в течение нескольких минут</p>
          <a href="/login.html" class="text-brand-600 text-sm hover:text-brand-700">← Вернуться ко входу</a>
        </div>

      </div>
    </div>
  </main>

  <script>
    document.getElementById("forgot-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const errorEl = document.getElementById("error");
      const btn = document.getElementById("submit-btn");
      errorEl.classList.add("hidden");
      btn.disabled = true;
      btn.textContent = "Отправляем...";

      try {
        const resp = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        // API всегда возвращает 200 (не раскрываем существование аккаунта)
        document.getElementById("form-view").classList.add("hidden");
        document.getElementById("success-view").classList.remove("hidden");
      } catch (err) {
        errorEl.textContent = "Ошибка соединения. Попробуйте позже.";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Отправить ссылку";
      }
    });
  </script>
</body>
</html>
