<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подключения — Аркентий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{50:"#eef2ff",100:"#e0e7ff",500:"#6366f1",600:"#4f46e5",700:"#4338ca"}}}}}</script>
  <style>
    .sidebar-link{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-radius:0.5rem;color:#4b5563;transition:all 0.15s}
    .sidebar-link:hover{background:#f3f4f6;color:#1f2937}.sidebar-link.active{background:#eef2ff;color:#4f46e5;font-weight:500}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:1rem;padding:1.25rem}
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">
  <header class="lg:hidden fixed top-0 left-0 right-0 bg-white border-b z-50 px-4 h-14 flex items-center justify-between">
    <a href="/" class="text-lg font-bold text-brand-600">Аркентий</a>
    <button onclick="toggleMenu()" class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  </header>
  <div id="menu-overlay" class="lg:hidden fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleMenu()"></div>
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r flex flex-col z-50 transform -translate-x-full lg:translate-x-0 transition-transform">
    <div class="p-6 border-b hidden lg:block"><a href="/" class="text-xl font-bold text-brand-600">Аркентий</a></div>
    <div class="p-6 border-b lg:hidden flex items-center justify-between"><span class="text-lg font-bold text-brand-600">Меню</span><button onclick="toggleMenu()">✕</button></div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="/cabinet/" class="sidebar-link">🏠 Обзор</a>
      <a href="/cabinet/subscription.html" class="sidebar-link">📦 Подписка</a>
      <a href="/cabinet/connections.html" class="sidebar-link active">🔗 Подключения</a>
      <a href="/cabinet/billing.html" class="sidebar-link">💳 Платежи</a>
      <a href="/cabinet/settings.html" class="sidebar-link">⚙️ Настройки</a>
    </nav>
    <div class="p-4 border-t"><button onclick="logout()" class="text-sm text-gray-500">Выйти</button></div>
  </aside>
  <main class="pt-14 lg:pt-0 lg:ml-64 p-4 lg:p-8">
    <div class="max-w-4xl">
      <h1 class="text-xl lg:text-2xl font-bold mb-4 lg:mb-6">Подключения</h1>

      <!-- iiko BO -->
      <div class="card mb-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold">iiko BO</h2>
          <span id="iiko-status">—</span>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-2 text-sm mb-3">
          <div><span class="text-gray-500">URL:</span> <span id="iiko-url" class="font-mono text-xs break-all">—</span></div>
          <div><span class="text-gray-500">Логин:</span> <span id="iiko-login">—</span></div>
        </div>
        <div class="flex gap-2">
          <button onclick="testIiko()" class="px-4 py-2 text-sm bg-brand-600 text-white rounded-lg hover:bg-brand-700">Проверить</button>
          <button onclick="toggleIikoForm()" id="btn-edit-iiko" class="px-4 py-2 text-sm border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Изменить</button>
        </div>
        <!-- Форма редактирования iiko -->
        <div id="iiko-form" class="hidden mt-4 pt-4 border-t space-y-3">
          <div>
            <label class="block text-sm text-gray-600 mb-1">URL (http://server:порт)</label>
            <input id="f-iiko-url" type="url" placeholder="http://iiko.example.com:9900" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Логин</label>
            <input id="f-iiko-login" type="text" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Пароль</label>
            <input id="f-iiko-password" type="password" placeholder="Оставьте пустым, чтобы не менять" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          </div>
          <div class="flex gap-2">
            <button onclick="saveIiko()" id="btn-save-iiko" class="px-4 py-2 text-sm bg-brand-600 text-white rounded-lg hover:bg-brand-700">Сохранить</button>
            <button onclick="toggleIikoForm()" class="px-4 py-2 text-sm border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Отмена</button>
          </div>
        </div>
      </div>

      <!-- Telegram -->
      <div class="card">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold">Telegram-чаты</h2>
          <span id="tg-bot" class="text-sm text-gray-500">—</span>
        </div>
        <div id="chats-list" class="space-y-3 mb-3"><div class="text-gray-500 text-sm">Загрузка...</div></div>
        <div class="text-xs text-gray-400 bg-gray-50 rounded-lg p-3">
          Чтобы добавить чат: напишите боту <span id="tg-bot-link" class="font-mono text-brand-600"></span> команду <span class="font-mono">/start</span>, затем добавьте бота в нужный Telegram-чат.
        </div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-4 right-4 hidden z-50">
    <div class="bg-gray-800 text-white text-sm px-4 py-2 rounded-lg shadow-lg" id="toast-msg"></div>
  </div>

  <script src="/js/cabinet.js"></script>
  <script>
    function toggleMenu(){document.getElementById("sidebar").classList.toggle("-translate-x-full");document.getElementById("menu-overlay").classList.toggle("hidden")}

    let connectionsData = null;
    let toastTimer;

    function showToast(msg, type="info") {
      const t = document.getElementById("toast");
      const m = document.getElementById("toast-msg");
      m.textContent = msg;
      t.querySelector("div").className = "text-sm px-4 py-2 rounded-lg shadow-lg " +
        (type==="success"?"bg-green-600 text-white":type==="error"?"bg-red-600 text-white":"bg-gray-800 text-white");
      t.classList.remove("hidden");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>t.classList.add("hidden"), 3000);
    }

    document.addEventListener("DOMContentLoaded", async () => { if (!checkAuth()) return; await loadConnections(); });

    async function loadConnections() {
      try {
        connectionsData = await apiGet("/api/cabinet/connections");
        renderIiko();
        renderChats();
      } catch(e) { showToast("Ошибка загрузки", "error"); }
    }

    function renderIiko() {
      const i = connectionsData.iiko;
      document.getElementById("iiko-status").innerHTML = i.status === "ok"
        ? '<span class="text-green-600">✅ Работает</span>'
        : '<span class="text-gray-500">⚪ Не настроен</span>';
      document.getElementById("iiko-url").textContent = i.url || "—";
      document.getElementById("iiko-login").textContent = i.login || "—";
    }

    function renderChats() {
      const tg = connectionsData.telegram;
      const bot = "@" + tg.bot_username;
      document.getElementById("tg-bot").textContent = "Бот: " + bot;
      document.getElementById("tg-bot-link").textContent = bot;
      if (!tg.chats || !tg.chats.length) {
        document.getElementById("chats-list").innerHTML = '<div class="text-gray-500 text-sm">Нет чатов</div>';
        return;
      }
      document.getElementById("chats-list").innerHTML = tg.chats.map(c =>
        `<div class="border rounded-lg p-3"><div class="font-medium">${escapeHtml(c.name)}</div><div class="text-sm text-gray-400">ID: ${escapeHtml(String(c.chat_id))}</div></div>`
      ).join("");
    }

    async function testIiko() {
      showToast("Проверяю...", "info");
      try {
        await apiPost("/api/cabinet/connections/iiko/test", {});
        showToast("Соединение успешно!", "success");
      } catch(e) { showToast(e.message || "Ошибка соединения", "error"); }
    }

    function toggleIikoForm() {
      const form = document.getElementById("iiko-form");
      form.classList.toggle("hidden");
      if (!form.classList.contains("hidden") && connectionsData) {
        document.getElementById("f-iiko-url").value = connectionsData.iiko.url || "";
        document.getElementById("f-iiko-login").value = connectionsData.iiko.login || "";
        document.getElementById("f-iiko-password").value = "";
      }
    }

    async function saveIiko() {
      const url = document.getElementById("f-iiko-url").value.trim();
      const login = document.getElementById("f-iiko-login").value.trim();
      const password = document.getElementById("f-iiko-password").value;
      if (!url || !login) { showToast("URL и логин обязательны", "error"); return; }
      const btn = document.getElementById("btn-save-iiko");
      btn.disabled = true; btn.textContent = "Сохраняю...";
      try {
        const body = {url, login};
        if (password) body.password = password;
        await apiPut("/api/cabinet/connections/iiko", body);
        showToast("Данные сохранены", "success");
        document.getElementById("iiko-form").classList.add("hidden");
        await loadConnections();
      } catch(e) {
        showToast(e.message || "Ошибка сохранения", "error");
      } finally { btn.disabled = false; btn.textContent = "Сохранить"; }
    }

    function escapeHtml(s) {
      return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
