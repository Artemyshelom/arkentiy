services:
  app:
    build: .
    container_name: ebidoebi-integrations
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"   # только localhost — снаружи доступ через nginx
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
      - ./web:/app/web
      - ./docs:/app/docs:ro
      - ./rules:/app/rules:ro
      - hf_cache:/root/.cache/huggingface
    environment:
      - TZ=Europe/Moscow
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 180s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ebidoebi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ebidoebi
      POSTGRES_USER: ebidoebi
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebidoebi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  hf_cache:
