<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка оплаты — Аркентий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50:'#eef2ff',100:'#e0e7ff',500:'#6366f1',600:'#4f46e5',700:'#4338ca' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col">

  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center">
      <a href="/" class="text-xl font-bold text-brand-600">Аркентий</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-16">
    <div class="w-full max-w-md text-center">
      <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-5">
          <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Оплата не прошла</h1>
        <div class="text-sm text-gray-600 space-y-1 mb-6">
          <p>Возможные причины:</p>
          <ul class="text-left ml-6 list-disc space-y-1 mt-2">
            <li>Недостаточно средств на карте</li>
            <li>Карта заблокирована банком</li>
            <li>Технический сбой</li>
          </ul>
        </div>

        <div class="space-y-3">
          <button onclick="retryPayment()" id="btn-retry" class="w-full px-6 py-3 bg-brand-600 text-white font-semibold rounded-xl hover:bg-brand-700 transition-colors">
            Попробовать снова
          </button>
          <a href="/register.html" class="block px-6 py-3 text-brand-600 font-medium rounded-xl border border-brand-200 hover:bg-brand-50 transition-colors text-sm text-center">
            Выбрать другой способ оплаты
          </a>
          <a href="https://t.me/artemiy_shelomentsev" class="block px-6 py-3 text-gray-500 font-medium text-sm text-center hover:text-brand-600 transition-colors">
            Или напишите нам в Telegram
          </a>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function retryPayment() {
      const params = new URLSearchParams(window.location.search);
      const paymentId = params.get("payment_id");
      if (!paymentId) {
        window.location.href = "/register.html";
        return;
      }

      const btn = document.getElementById("btn-retry");
      btn.disabled = true;
      btn.textContent = "Создаём платёж...";

      try {
        // Повторный платёж без JWT — бэкенд находит данные исходного платежа сам
        const resp = await fetch(`/api/payments/${paymentId}/retry`, {
          method: "POST",
        });
        if (!resp.ok) throw new Error("retry failed");
        const data = await resp.json();
        window.location.href = data.confirmation_url;
      } catch {
        alert("Не удалось создать платёж. Попробуйте зарегистрироваться заново.");
        btn.disabled = false;
        btn.textContent = "Попробовать снова";
      }
    }
  </script>

  <footer class="py-6 border-t border-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center text-xs text-gray-400">
      <p>&copy; 2026 Аркентий</p>
    </div>
  </footer>
</body>
</html>
