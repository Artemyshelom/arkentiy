<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — Аркентий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50:"#eef2ff",100:"#e0e7ff",500:"#6366f1",600:"#4f46e5",700:"#4338ca" } } } } }
  </script>
  <style>
    .sidebar-link { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:0.5rem; color:#4b5563; transition:all 0.15s; }
    .sidebar-link:hover { background:#f3f4f6; color:#1f2937; }
    .sidebar-link.active { background:#eef2ff; color:#4f46e5; font-weight:500; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:1rem; padding:1.25rem; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">
  <!-- Mobile Header -->
  <header class="lg:hidden fixed top-0 left-0 right-0 bg-white border-b z-50 px-4 h-14 flex items-center justify-between">
    <a href="/" class="text-lg font-bold text-brand-600">Аркентий</a>
    <button onclick="toggleMenu()" class="p-2">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </header>

  <!-- Mobile Menu Overlay -->
  <div id="menu-overlay" class="lg:hidden fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleMenu()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-100 flex flex-col z-50 transform -translate-x-full lg:translate-x-0 transition-transform">
    <div class="p-6 border-b border-gray-100 hidden lg:block">
      <a href="/" class="text-xl font-bold text-brand-600">Аркентий</a>
    </div>
    <div class="p-6 border-b border-gray-100 lg:hidden flex items-center justify-between">
      <span class="text-lg font-bold text-brand-600">Меню</span>
      <button onclick="toggleMenu()" class="p-1">✕</button>
    </div>
    <nav class="flex-1 p-4 space-y-1">
      <a href="/cabinet/" class="sidebar-link active" onclick="toggleMenu()">🏠 Обзор</a>
      <a href="/cabinet/subscription.html" class="sidebar-link" onclick="toggleMenu()">📦 Подписка</a>
      <a href="/cabinet/connections.html" class="sidebar-link" onclick="toggleMenu()">🔗 Подключения</a>
      <a href="/cabinet/billing.html" class="sidebar-link" onclick="toggleMenu()">💳 Платежи</a>
      <a href="/cabinet/settings.html" class="sidebar-link" onclick="toggleMenu()">⚙️ Настройки</a>
    </nav>
    <div class="p-4 border-t border-gray-100">
      <div id="tenant-info" class="text-sm text-gray-500 mb-3">
        <div class="font-medium text-gray-900">—</div>
        <div>— города, — точек</div>
      </div>
      <button onclick="logout()" class="text-sm text-gray-500 hover:text-gray-700">Выйти</button>
    </div>
  </aside>

  <!-- Content -->
  <main class="pt-14 lg:pt-0 lg:ml-64 p-4 lg:p-8">
    <div class="max-w-5xl">
      <h1 id="greeting" class="text-xl lg:text-2xl font-bold text-gray-900 mb-4 lg:mb-6">Добрый день 👋</h1>
      
      <!-- Status Cards -->
      <div class="grid grid-cols-1 gap-3 lg:grid-cols-3 lg:gap-4 mb-6">
        <div class="card">
          <div class="text-sm text-gray-500 mb-1">Подписка</div>
          <div id="sub-status" class="text-base lg:text-lg font-semibold text-green-600">—</div>
          <div id="sub-details" class="text-sm text-gray-600 mt-1">—</div>
          <a href="/cabinet/subscription.html" class="text-sm text-brand-600 hover:text-brand-700 mt-2 inline-block">Управлять →</a>
        </div>
        <div class="card">
          <div class="text-sm text-gray-500 mb-1">Подключения</div>
          <div id="conn-iiko" class="text-sm mt-1">iiko: —</div>
          <div id="conn-tg" class="text-sm">Telegram: —</div>
          <a href="/cabinet/connections.html" class="text-sm text-brand-600 hover:text-brand-700 mt-2 inline-block">Подробнее →</a>
        </div>
        <div class="card">
          <div class="text-sm text-gray-500 mb-1">Следующий платёж</div>
          <div id="next-pay-date" class="text-base lg:text-lg font-semibold">—</div>
          <div id="next-pay-amount" class="text-sm text-gray-600">—</div>
          <a href="/cabinet/billing.html" class="text-sm text-brand-600 hover:text-brand-700 mt-2 inline-block">Подробнее →</a>
        </div>
      </div>

      <!-- Recent Events -->
      <div class="card">
        <h2 class="font-semibold text-gray-900 mb-4">Последние события</h2>
        <div id="events-list" class="space-y-3 text-sm">
          <div class="text-gray-500">Загрузка...</div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/cabinet.js"></script>
  <script>
    function toggleMenu() {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("menu-overlay");
      sidebar.classList.toggle("-translate-x-full");
      overlay.classList.toggle("hidden");
    }

    document.addEventListener("DOMContentLoaded", async () => {
      if (!checkAuth()) return;
      await loadOverview();
    });

    async function loadOverview() {
      try {
        const data = await apiGet("/api/cabinet/overview");
        
        const hour = new Date().getHours();
        const greeting = hour < 12 ? "Доброе утро" : hour < 18 ? "Добрый день" : "Добрый вечер";
        document.getElementById("greeting").textContent = `${greeting}, ${data.tenant.contact} 👋`;
        
        document.getElementById("tenant-info").innerHTML = `
          <div class="font-medium text-gray-900">${data.tenant.name}</div>
          <div>${data.subscription.cities_count} города, ${data.subscription.branches_count} точек</div>
        `;
        
        const statusMap = { active: "✅ Активна", trial: "⏳ Триал", past_due: "⚠️ Просрочка", cancelled: "❌ Отменена" };
        document.getElementById("sub-status").textContent = statusMap[data.subscription.status] || data.subscription.status;
        const addons = data.subscription.addons.length ? ` + ${data.subscription.addons.join(", ")}` : "";
        document.getElementById("sub-details").textContent = `Базовый${addons}`;
        
        const iikoStatus = data.connections.iiko.status === "ok" ? "✅ работает" : "⚪ не настроен";
        const tgStatus = data.connections.telegram.status === "ok" ? "✅ работает" : "⚪ не настроен";
        document.getElementById("conn-iiko").innerHTML = `iiko: ${iikoStatus}`;
        document.getElementById("conn-tg").innerHTML = `Telegram: ${tgStatus}`;
        
        if (data.subscription.next_payment_date) {
          document.getElementById("next-pay-date").textContent = formatDate(data.subscription.next_payment_date);
          document.getElementById("next-pay-amount").textContent = formatMoney(data.subscription.next_payment_amount);
        } else {
          document.getElementById("next-pay-date").textContent = "—";
        }
        
        const eventsHtml = data.recent_events.length ? data.recent_events.map(e => `
          <div class="flex items-start gap-3 py-2 border-b border-gray-50 last:border-0">
            <span class="text-gray-400 flex-shrink-0">${formatDateTime(e.date)}</span>
            <span>${e.icon === "success" ? "✅" : "📊"} ${e.text}</span>
          </div>
        `).join("") : "<div class=\"text-gray-500\">Пока нет событий</div>";
        document.getElementById("events-list").innerHTML = eventsHtml;
        
      } catch (err) {
        console.error(err);
        showToast("Не удалось загрузить данные", "error");
      }
    }
  </script>
</body>
</html>
