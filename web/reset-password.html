<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль — Аркентий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50:"#eef2ff",100:"#e0e7ff",500:"#6366f1",600:"#4f46e5",700:"#4338ca" } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col">
  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center">
      <a href="/" class="text-xl font-bold text-brand-600">Аркентий</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-16">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">

        <!-- Недействительный токен -->
        <div id="invalid-view" class="hidden text-center">
          <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-gray-900 mb-2">Ссылка недействительна</h2>
          <p class="text-sm text-gray-500 mb-6">Ссылка устарела или уже была использована. Запросите новую.</p>
          <a href="/forgot-password.html" class="inline-block py-2.5 px-6 bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700 transition text-sm">
            Запросить снова
          </a>
        </div>

        <!-- Форма -->
        <div id="form-view" class="hidden">
          <h1 class="text-2xl font-bold text-gray-900 mb-2 text-center">Новый пароль</h1>
          <p class="text-sm text-gray-500 text-center mb-6">Придумайте надёжный пароль</p>
          <form id="reset-form" class="space-y-4">
            <div>
              <label class="block text-sm text-gray-600 mb-1">Новый пароль</label>
              <input type="password" id="password" required minlength="8"
                class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                placeholder="Минимум 8 символов">
            </div>
            <div>
              <label class="block text-sm text-gray-600 mb-1">Повторите пароль</label>
              <input type="password" id="password2" required
                class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                placeholder="••••••••">
            </div>
            <div id="error" class="text-red-600 text-sm hidden"></div>
            <button type="submit" id="submit-btn"
              class="w-full py-2.5 bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700 transition disabled:opacity-50">
              Сохранить пароль
            </button>
          </form>
        </div>

        <!-- Успех -->
        <div id="success-view" class="hidden text-center">
          <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-gray-900 mb-2">Пароль изменён</h2>
          <p class="text-sm text-gray-500 mb-6">Входите в кабинет с новым паролем</p>
          <a href="/cabinet/" class="inline-block py-2.5 px-6 bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700 transition text-sm">
            Перейти в кабинет
          </a>
        </div>

      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      document.getElementById("invalid-view").classList.remove("hidden");
    } else {
      document.getElementById("form-view").classList.remove("hidden");
    }

    document.getElementById("reset-form")?.addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      const errorEl = document.getElementById("error");
      const btn = document.getElementById("submit-btn");
      errorEl.classList.add("hidden");

      if (password !== password2) {
        errorEl.textContent = "Пароли не совпадают";
        errorEl.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Сохраняем...";

      try {
        const resp = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password: password })
        });

        if (resp.ok) {
          const data = await resp.json();
          // Сохраняем новый токен и переходим в кабинет
          if (data.token) {
            localStorage.setItem("arkentiy_token", data.token);
          }
          document.getElementById("form-view").classList.add("hidden");
          document.getElementById("success-view").classList.remove("hidden");
          setTimeout(() => { window.location.href = "/cabinet/"; }, 2000);
        } else {
          const data = await resp.json().catch(() => ({}));
          if (resp.status === 400) {
            document.getElementById("form-view").classList.add("hidden");
            document.getElementById("invalid-view").classList.remove("hidden");
          } else {
            errorEl.textContent = data.detail || "Ошибка сервера. Попробуйте позже.";
            errorEl.classList.remove("hidden");
            btn.disabled = false;
            btn.textContent = "Сохранить пароль";
          }
        }
      } catch (err) {
        errorEl.textContent = "Ошибка соединения. Попробуйте позже.";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Сохранить пароль";
      }
    });
  </script>
</body>
</html>
