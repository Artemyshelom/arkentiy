# Аркентий — nginx конфиг
# Основной домен: arkenty.ru
# IDN домен аркентий.рф добавить отдельно когда пропишется DNS

# ─── HTTP: ACME challenge + редирект на HTTPS ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name arkenty.ru www.arkenty.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://arkenty.ru$request_uri;
    }
}

# ─── HTTPS: www → apex редирект ──────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.arkenty.ru;

    ssl_certificate     /etc/letsencrypt/live/arkenty.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arkenty.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://arkenty.ru$request_uri;
}

# ─── HTTPS: основной сервер ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name arkenty.ru;

    ssl_certificate     /etc/letsencrypt/live/arkenty.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arkenty.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "SAMEORIGIN"                                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;

    client_max_body_size 10M;

    # Proxy → FastAPI app
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

