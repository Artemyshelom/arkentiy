<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Аркентий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { 50:"#eef2ff",100:"#e0e7ff",500:"#6366f1",600:"#4f46e5",700:"#4338ca" } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen flex flex-col">
  <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center">
      <a href="/" class="text-xl font-bold text-brand-600">Аркентий</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 pt-16">
    <div class="w-full max-w-sm">
      <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Вход в кабинет</h1>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm text-gray-600 mb-1">Email</label>
            <input type="email" id="email" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500" placeholder="email@example.com">
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">Пароль</label>
            <input type="password" id="password" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500" placeholder="••••••••">
          </div>
          <div id="error" class="text-red-600 text-sm hidden"></div>
          <button type="submit" class="w-full py-2.5 bg-brand-600 text-white font-medium rounded-lg hover:bg-brand-700 transition">Войти</button>
        </form>
        <div class="mt-4 text-center text-sm text-gray-500">
          Нет аккаунта? <a href="/register.html" class="text-brand-600 hover:text-brand-700">Зарегистрироваться</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Check if already logged in
    const token = localStorage.getItem("arkentiy_token");
    if (token) {
      const redirect = new URLSearchParams(window.location.search).get("redirect") || "/cabinet/";
      window.location.href = redirect;
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("error");
      errorEl.classList.add("hidden");

      try {
        const resp = await fetch("/api/cabinet/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        
        if (resp.ok) {
          const data = await resp.json();
          localStorage.setItem("arkentiy_token", data.token);
          const redirect = new URLSearchParams(window.location.search).get("redirect") || "/cabinet/";
          window.location.href = redirect;
        } else {
          errorEl.textContent = "Неверный email или пароль";
          errorEl.classList.remove("hidden");
        }
      } catch (err) {
        errorEl.textContent = "Ошибка соединения";
        errorEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
